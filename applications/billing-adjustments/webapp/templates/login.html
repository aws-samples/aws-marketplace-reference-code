<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign in — Billing Adjustments</title>
<style>
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #f4f6f8; color: #232f3e; display: flex; min-height: 100vh; align-items: center; justify-content: center; }
  .card { background: #fff; border: 1px solid #d9dee3; border-radius: 8px; padding: 28px; width: 340px; }
  h1 { font-size: 18px; margin: 0 0 4px; }
  p { color: #5f6b7a; font-size: 13px; margin: 0 0 18px; }
  label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  input { width: 100%; padding: 9px 10px; border: 1px solid #d9dee3; border-radius: 6px; font-size: 14px; margin-bottom: 14px; box-sizing: border-box; }
  button { background: #ec7211; color: #fff; border: none; padding: 10px 18px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; width: 100%; }
  button:hover { background: #d35400; }
  .err { background: #fdecea; color: #c0392b; border: 1px solid #f1b0a8; border-radius: 6px; padding: 8px 10px; font-size: 13px; margin-bottom: 14px; }
</style>
</head>
<body>
  <form class="card" method="POST">
    <h1>AWS Marketplace Billing Adjustments</h1>
    <p>Enter the access password to continue.</p>
    {% if error %}<div class="err">{{ error }}</div>{% endif %}
    <label for="password">Access password</label>
    <input type="password" id="password" name="password" autocomplete="current-password" autofocus>
    <button type="submit">Sign in</button>
  </form>
</body>
</html>
